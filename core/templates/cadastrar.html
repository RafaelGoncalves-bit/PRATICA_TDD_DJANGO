{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Página Inicial - Práticas TDD 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="{% static 'index.css' %}" rel="stylesheet">

</head>

<body>
  <div class="container container-main">
    <div class="card">
      <h2 class="mb-4">Painel de Ações</h2>

      <form method="POST" action="{% url 'criar' %}">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="alert alert-danger">{{ form.non_field_errors }}</div>
        {% endif %}
        {{ form.titulo }}
        {{ form.link }}
        {{ form.observacao }}
        <button type="submit" class="btn btn-primary w-100">
          <i class="fas fa-plus me-2"></i>Cadastrar Link
        </button>

        <button type="button" onclick="window.location.href='/'" class="btn btn-danger btn-action mt-3">
          <i class="fas me-2"></i>Voltar
        </button>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'main.js' %}"></script>
</body>

</html>
