{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Links</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{% static 'index.css' %}" rel="stylesheet">
</head>

<body>

    <div class="container container-main">
        <div class="card">






            {% for link in dados %}



            <form method="POST" action="{% url 'editar' form.instance.id %}">
                {% csrf_token %}
                {% if form.non_field_errors %}
                  <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                {% endif %}
                {{ form.titulo }}
                {{ form.link }}
                {{ form.observacao }}
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <button type="button" onclick="window.location.href='/listar'" class="btn btn-secondary btn-action w-25">
                        <i class="fas me-2"></i>Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary btn-action w-25">
                        <i class="fas me-2"></i>Salvar
                    </button>
                </div>
            </form>
        </div>






        {% empty %}

        <p>Nenhum link cadastrado</p>

        {% endfor %}



    </div>
    </div>

</body>

</html>
