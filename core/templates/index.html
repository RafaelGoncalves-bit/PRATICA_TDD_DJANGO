{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Página Inicial - Práticas TDD 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="{% static 'index.css' %}" rel="stylesheet">

</head>

<body>
  <div class="container container-main py-5">
    <div class="card action-card text-center mx-auto">
      <div class="card-body">
        <div class="theme-toggle-wrapper text-end mb-3">
          <button id="theme-toggle" type="button" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-moon me-1" id="theme-toggle-icon"></i>
            <span id="theme-toggle-text">Tema claro</span>
          </button>
        </div>
        <div class="hero-badge">
          <i class="fas fa-link"></i> Link Management
        </div>
        <h1 class="card-title mb-3">Linkpedia</h1>
        <p class="text-secondary mb-5">Organize os seus links com elegância e rapidez. Cadastre, edite e gerencie tudo em um só lugar.</p>
        <div class="d-grid gap-3">
          <a href="{% url 'criar' %}" class="btn btn-primary btn-lg">
            <i class="fas fa-plus me-2"></i>Cadastrar link
          </a>
          <a href="{% url 'listar' %}" class="btn btn-outline-primary btn-lg">
            <i class="fas fa-list me-2"></i>Ver links cadastrados
          </a>
          <form method="POST" action="{% url 'logout' %}" class="mb-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-dark btn-lg">
              <i class="fas fa-sign-out-alt me-2"></i>Logout
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'main.js' %}"></script>
</body>

</html>
