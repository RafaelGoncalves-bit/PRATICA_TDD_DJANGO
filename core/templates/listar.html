{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Links</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{% static 'index.css' %}" rel="stylesheet">
</head>

<body>

    <div class="container container-main">
        <div class="card-listar">


            <button onclick="window.location.href='/'" class="btn btn-danger btn-action">
                <i class="fas me-2"></i>Voltar
            </button>


            {% for link in dados %}


            <div class="card-listar mt-3 p-3">

                <h5>{{ link.titulo }}</h5>

                <a href="{{ link.link }}" target="_blank">
                    {{ link.link }}
                </a>

                <p>{{ link.observacao }}</p>

                <a href="{% url 'editar' link.id %}" class=" text-black">
                <i class="fas fa-edit me-2"></i>Editar
            </a>

            </div>

            {% empty %}

            <p>Nenhum link cadastrado</p>

            {% endfor %}



        </div>
    </div>

</body>

</html>
